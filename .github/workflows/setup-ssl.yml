name: Manual Nginx & SSL Setup

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Admin Email for Let''s Encrypt (e.g. admin@gkava.com)'
        required: true
        default: 'admin@gkava.com'

jobs:
  setup-nginx-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Nginx and Generate SSL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "Installing Nginx and Certbot if they don't exist..."
            apt-get update
            apt-get install -y nginx certbot python3-certbot-nginx
            
            # Ensure directories exist
            mkdir -p /etc/nginx/sites-available
            mkdir -p /etc/nginx/sites-enabled
            
            echo "Creating Nginx configuration for Production (gkava.com)..."
            cat << 'EOF' > /etc/nginx/sites-available/gkava-prod
            server {
                server_name gkava.com www.gkava.com;

                location / {
                    proxy_pass http://localhost:9000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }

                location /api/ {
                    proxy_pass http://localhost:9080/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF
            
            echo "Creating Nginx configuration for Sandbox (gkava.sandbox.com)..."
            cat << 'EOF' > /etc/nginx/sites-available/gkava-sandbox
            server {
                server_name gkava.sandbox.com;

                location / {
                    proxy_pass http://localhost:9001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }

                location /api/ {
                    proxy_pass http://localhost:9081/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF
            
            echo "Enabling configurations..."
            ln -sf /etc/nginx/sites-available/gkava-prod /etc/nginx/sites-enabled/
            ln -sf /etc/nginx/sites-available/gkava-sandbox /etc/nginx/sites-enabled/
            
            echo "Testing Nginx configuration..."
            nginx -t
            
            echo "Restarting Nginx..."
            systemctl restart nginx
            
            echo "Generating SSL Certificates via Certbot..."
            certbot --nginx --non-interactive --agree-tos -m "${{ github.event.inputs.email }}" -d gkava.com -d www.gkava.com
            certbot --nginx --non-interactive --agree-tos -m "${{ github.event.inputs.email }}" -d gkava.sandbox.com
            
            echo "Setup Complete! SSL applied successfully."
